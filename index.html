<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Padel Turneringsplan</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="container">
      <header>
        <h1>🎾 Padel Turneringsplan</h1>
        <p>Lav en hurtig turnering, der virker på mobil.</p>
      </header>

      <section class="card">
        <h2>1) Deltagere</h2>
        <form id="player-form" class="row">
          <input id="player-input" type="text" placeholder="Navn på spiller" maxlength="30" required />
          <button type="submit">Tilføj</button>
        </form>
        <ul id="player-list" class="player-list"></ul>
        <p class="muted">Tip: I kan være 4-16 spillere.</p>
      </section>

      <section class="card">
        <h2>2) Indstillinger</h2>
        <div class="row stacked-mobile">
          <label>
            Baner
            <input id="courts" type="number" min="1" max="8" value="1" />
          </label>
          <label>
            Kamp-varighed (min)
            <input id="match-duration" type="number" min="10" max="120" value="25" />
          </label>
          <label>
            Starttid
            <input id="start-time" type="time" value="10:00" />
          </label>
        </div>
        <button id="generate-btn" class="primary">Generér turneringsplan</button>
      </section>

      <section class="card">
        <h2>3) Plan</h2>
        <div id="schedule-empty" class="muted">Ingen plan endnu.</div>
        <div id="schedule" class="schedule"></div>
      </section>
    </main>

    <template id="match-template">
      <article class="match">
        <div class="match-time"></div>
        <div class="match-court"></div>
        <div class="match-teams"></div>
      </article>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
